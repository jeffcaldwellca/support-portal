<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Slim Framework routing
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Uploads live outside the DocumentRoot and must never be web-served or
    # executed. Deny direct access and disable any handler/engine defensively.
    <Directory /var/www/html/uploads>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all denied
        php_admin_flag engine off
        RemoveHandler .php .phtml .php3 .php4 .php5 .php7 .phar
        AddType text/plain .php .phtml .phar
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Security headers (kept in sync with SecurityHeadersMiddleware so static
    # assets served directly by Apache get the same protection).
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    # Modern guidance is to disable the legacy XSS auditor rather than enable it.
    Header always set X-XSS-Protection "0"
</VirtualHost>
